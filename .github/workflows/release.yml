name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy geo_sam3_inference --ignore-missing-imports

      - name: Run tests
        run: pytest

      - name: Build geo_sam3_inference.zip
        run: zip -r geo_sam3_inference.zip geo_sam3_inference/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: geo_sam3_inference.zip
          generate_release_notes: true
